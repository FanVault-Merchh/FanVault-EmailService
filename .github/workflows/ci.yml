# ══════════════════════════════════════════════════════════════════════════
#  email-service Caller Workflow
#  Repo:  FanVault-Merchh/email-service
#  Path:  .github/workflows/ci.yml
#
#  Calls the shared workflow in FanVault-shared-workflows, passing:
#    - service-specific inputs (name, image, helm path)
#    - org-level secrets via `secrets: inherit`
# ══════════════════════════════════════════════════════════════════════════
name: Email Service CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

# Permissions required by the shared workflow
permissions:
  contents: write     # Create git tags on main
  packages: write     # Push to GHCR
  security-events: write

jobs:
  ci:
    name: Email Service Pipeline
    uses: FanVault-Merchh/FanVault-shared-workflows/.github/workflows/service-ci.yml@main
    with:
      # ── Service identification ───────────────────────────────────────────
      service-name: email-service

      # ── Docker Hub image path (must match Dockerfile / docker-compose image name)
      image-name: savitxr/fanvault-email

      # ── Helm chart repository containing the service values.yaml ─────────
      helm-repo: FanVault-Merchh/helm-charts

      # ── Path to the service values.yaml inside the helm repo ─────────────
      # Matches: fanvault-micro-apps/charts/email-service/values.yaml
      helm-values-path: fanvault-micro-apps/charts/email-service/values.yaml

      # ── Source directory (root of this repo, which is the service root)
      working-directory: '.'

    # Inherit ALL org-level and repo-level secrets automatically
    secrets: inherit

